name: Build Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - latest

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Download libghostty
        run: |
          mkdir -p Vendor/libghostty/lib
          gh release download libs-v1 -p 'libghostty.a' -D Vendor/libghostty/lib
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Import certificate
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12

          # Decode certificate
          echo "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode -o $CERTIFICATE_PATH

          # Create keychain
          security create-keychain -p "${{ secrets.APPLE_PASSWORD }}" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "${{ secrets.APPLE_PASSWORD }}" $KEYCHAIN_PATH

          # Import certificate
          security import $CERTIFICATE_PATH -P "${{ secrets.APPLE_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "${{ secrets.APPLE_PASSWORD }}" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Verify
          security find-identity -v -p codesigning

          # Cleanup
          rm -f $CERTIFICATE_PATH

      - name: Import Sparkle signing key
        run: |
          # Add EdDSA private key to Keychain for Sparkle signing
          # Sparkle uses service "https://sparkle-project.org" and account "ed25519"
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          # -A allows all apps to access without prompting (needed for CI)
          security add-generic-password -a "ed25519" -s "https://sparkle-project.org" -w "${{ secrets.SPARKLE_PRIVATE_KEY }}" -A -U $KEYCHAIN_PATH
          # Set partition list to allow access without prompting
          security set-key-partition-list -S apple-tool:,apple:,security: -k "${{ secrets.APPLE_PASSWORD }}" $KEYCHAIN_PATH

      - name: Optimize runner for Xcode builds
        run: |
          # Kill background services that compete for CPU/IO during builds
          # See: https://github.com/actions/runner-images/issues/13096
          sudo launchctl bootout system/com.apple.PerfPowerServices || true
          sudo launchctl bootout system/com.apple.metadata.mds || true

          # Install yeetd to kill other resource-wasting Apple daemons
          curl -L https://github.com/biscuitehh/yeetd/releases/download/1.0/yeetd-normal.pkg -o /tmp/yeetd.pkg
          sudo installer -pkg /tmp/yeetd.pkg -target /
          defaults write dev.biscuit.yeetd killapsd true
          yeetd &

          # Clear stale SPM artifact cache
          rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

          # Free disk space
          sudo rm -rf /Users/runner/Library/Android
          sudo rm -rf /Applications/Xcode_*.app/Contents/Developer/Platforms/iPhoneOS.platform/Library/Developer/CoreSimulator
          sudo rm -rf /Applications/Xcode_*.app/Contents/Developer/Platforms/WatchOS.platform
          sudo rm -rf /Applications/Xcode_*.app/Contents/Developer/Platforms/AppleTVOS.platform

      - name: Check changelog
        if: ${{ inputs.release_type == 'latest' }}
        run: make check-changelog

      - name: Get version
        id: version
        run: |
          echo "version=$(make get-version)" >> $GITHUB_OUTPUT
          echo "build=$(make get-build)" >> $GITHUB_OUTPUT

      - name: Build, sign, and notarize
        run: make notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Skwad-${{ steps.version.outputs.version }}
          path: |
            build/Skwad.zip
            build/Skwad.dmg
            build/appcast.xml

      - name: Create GitHub Release (prerelease)
        if: ${{ inputs.release_type == 'prerelease' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}.${{ steps.version.outputs.build }}
          name: Skwad v${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.build }})
          prerelease: true
          files: |
            build/Skwad.zip
            build/Skwad.dmg
            build/appcast.xml
          generate_release_notes: true

      - name: Create GitHub Release (latest)
        if: ${{ inputs.release_type == 'latest' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}.${{ steps.version.outputs.build }}
          name: Skwad v${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.build }})
          make_latest: true
          files: |
            build/Skwad.zip
            build/Skwad.dmg
            build/appcast.xml
          generate_release_notes: true
